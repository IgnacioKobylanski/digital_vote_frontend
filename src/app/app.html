<main class="main-component">
  @if (!currentVoter) {
    <app-voter-login 
      [error]="errorMsg" 
      (login)="handleLogin($event)">
    </app-voter-login>
  } @else {
    <app-voter-dashboard 
      [voter]="currentVoter" 
      [candidates]="candidates">
    </app-voter-dashboard>
  }
</main>

<div class="dashboard-container">
  <header class="welcome-header">
    <h1>Bienvenido, <span>{{ voter.fullName }}</span></h1>
    <p>Seleccioná tu candidato para emitir el voto</p>
  </header>

  <div *ngIf="errorMsg" class="error-banner">
    {{ errorMsg }}
  </div>

  <section class="candidates-grid">
    <div *ngFor="let candidate of candidates" class="candidate-card">
      <div class="candidate-img-wrapper">
        <img [src]="candidate.candidateImg" [alt]="candidate.name" class="candidate-photo">
      </div>

      <div class="candidate-info">
        <h3>{{ candidate.name }}</h3>
        <p class="position-tag">{{ candidate.position }}</p>
        
        <p class="party-name">
          <strong>Partido:</strong> {{ candidate.party?.name }}
        </p>
      </div>

      <button class="btn-vote" (click)="onVote(candidate)">
        Votar
      </button>
    </div>
  </section>
</div>

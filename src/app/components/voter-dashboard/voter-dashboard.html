<div class="dashboard-container">
  <header class="welcome-header">
    <h1>Bienvenido, <span>{{ voter.fullName }}</span></h1>
    <p>Seleccioná tu candidato para emitir el voto</p>
  </header>

  <div *ngIf="errorMsg" class="error-banner">
    {{ errorMsg }}
  </div>

  <section class="candidates-grid">
    <div *ngFor="let candidate of candidates" class="candidate-placeholder">
      <h3>{{ candidate.name }}</h3>
      <p>{{ candidate.party }}</p>
      <button class="btn-vote">Votar</button>
    </div>
  </section>
</div>

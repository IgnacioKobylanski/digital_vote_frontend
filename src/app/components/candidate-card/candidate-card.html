<div class="candidate-card">
  <div class="candidate-img-wrapper">
    <img [src]="candidate.candidateImg || 'assets/no-photo.png'" 
         [alt]="'Foto de ' + candidate.name" 
         class="candidate-photo">
  </div>

  <div class="candidate-info">
    <h3>{{ candidate.name }}</h3>
    <p class="position-tag">{{ candidate.position }}</p>
    
    @if (candidate.party?.logoUrl) {
      <img [src]="candidate.party?.logoUrl" 
           [alt]="'Logo de ' + candidate.party?.name" 
           class="party-badge">
    }
    
    <p class="party-name">{{ candidate.party?.name }}</p>
  </div>

  <button class="btn-vote" (click)="onVoteClick()">Votar</button>
</div>
